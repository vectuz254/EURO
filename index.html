<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Soccer Doodle</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="doodle-container">
        <span class="letter">G</span>
        
        <div class="action-zone">
            
            <div class="player player-pink">
                <div class="head"></div>
                <div class="torso"></div>
            </div>

            <div class="player player-white">
                <div class="head"></div>
                <div class="torso"></div>
                <div class="leg standing-leg"></div>
                <div class="leg kicking-leg" id="kickingLeg"></div>
            </div>

            <div class="ball" id="soccerBall"></div>
        </div>

        <span class="letter">gle</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
